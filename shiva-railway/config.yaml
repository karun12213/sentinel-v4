# SHIVA — Central Configuration
# All thresholds are loaded at startup; change here, not in code.

# ── Phase 1: HTF Bias Engine ──────────────────────────────────────────────
htf_bias:
  ema_fast: 50          # EMA fast period (Daily / H4)
  ema_slow: 200         # EMA slow period (Daily)
  h4_ema_slow: 50       # H4 uses EMA50 as its slow line
  structure_lookback: 10  # bars to scan for HH/HL (swing structure)
  weekly_open_buffer: 0.0 # pts buffer around weekly open (0 = exact cross)
  refresh_interval_mins: 60  # re-fetch HTF data every N minutes
  # Score weights (must sum to 100)
  weight_ema_cross: 40       # Daily EMA50/200 cross
  weight_structure: 35       # HH/HL or LH/LL market structure
  weight_weekly_open: 25     # price above/below weekly open
  # Thresholds
  bullish_threshold: 60   # score >= this → BULLISH
  bearish_threshold: -60  # score <= this → BEARISH
  # Between -60 and +60 → NEUTRAL (no trade bias override, normal filters apply)

# ── Phase 2: Kill Zone Time Filter ───────────────────────────────────────
kill_zones:
  london_open:  { start: "02:00", end: "05:00", tz: "US/Eastern" }
  new_york_open: { start: "07:00", end: "10:00", tz: "US/Eastern" }
  london_close: { start: "11:00", end: "12:00", tz: "US/Eastern", enabled: false }
  avoid_monday: true
  avoid_friday_after: "12:00"  # EST — avoid Friday afternoon

# ── Phase 3: News Avoidance ───────────────────────────────────────────────
news_filter:
  block_before_mins: 45    # block entries N minutes before high-impact event
  block_after_mins: 30     # block entries N minutes after high-impact event
  tighten_stops_pct: 0.50  # tighten existing SL to 50% during live news
  refresh_interval_hours: 4
  high_impact_keywords:
    - "Crude Oil Inventories"
    - "EIA"
    - "API Crude"
    - "Non-Farm Payroll"
    - "NFP"
    - "FOMC"
    - "Fed Chair"
    - "Federal Funds Rate"

# ── Phase 4: Confluence Scoring ───────────────────────────────────────────
confluence:
  full_entry_threshold: 90     # >= full position (1% risk)
  half_entry_threshold: 70     # 70-89 = half position (0.5% risk)
  # no-trade below 70
  scores:
    htf_bias_aligned: 25
    kill_zone_active: 15
    bos_or_choch: 20
    liquidity_sweep: 20
    fvg_present: 15
    cnn_confidence: 20
    rsi_div_or_ob: 10

# ── Phase 5: Market Regime ────────────────────────────────────────────────
regime:
  adx_trend_threshold: 25      # ADX > 25 → trending
  adx_range_threshold: 20      # ADX < 20 → ranging
  atr_percentile_hv: 90        # ATR > 90th pct → high volatility
  atr_lookback: 20
  ema_slope_lookback: 5        # bars for EMA slope calculation
  hv_size_reduction: 0.50      # reduce position 50% in HIGH_VOLATILITY
  bb_width_narrow_pct: 0.02    # BB width < 2% of price → narrow (ranging)

# ── Phase 6: CNN Ensemble ─────────────────────────────────────────────────
cnn:
  enabled: false               # enable when CNN server is live
  base_url: "http://localhost:5000"
  min_confidence: 0.65         # skip if ensemble confidence < 65%
  window_size: 60
  n_features: 24

# ── Phase 7: Judas Swing ─────────────────────────────────────────────────
judas_swing:
  session_lookback_mins: 15    # measure initial direction in first 15 min
  sweep_window_mins: 30        # watch for sweep in first 30 min
  displacement_min_atr: 0.8   # displacement candle must be >= 0.8x ATR
  fvg_max_age_bars: 5

# ── Phase 8: Dynamic Stop Loss ───────────────────────────────────────────
dynamic_sl:
  min_atr_mult: 1.5            # SL must be >= 1.5x ATR from entry
  max_atr_mult: 3.0            # SL wider than 3x ATR → skip trade
  breakeven_at_rr: 1.0         # move to breakeven after 1:1 RR
  partial_exit_pct: 0.50       # close 50% at 1:1
  tp_fib: -0.27                # Fib extension TP for remaining 50%

# ── Phase 9: Circuit Breaker ─────────────────────────────────────────────
circuit_breaker:
  max_daily_losses: 2          # pause after N losses in one day
  max_daily_drawdown_pct: 2.0  # full shutdown if daily DD > 2%
  max_daily_trades: 20         # max per day (backtest: 6-17 signals/day on 5m)
  wr_review_window: 20         # rolling N-trade window
  wr_alert_threshold: 0.50     # alert + reduce size if WR < 50%
  size_reduction_on_alert: 0.50

# ── Phase 10: Walk-Forward Backtesting ────────────────────────────────────
backtest:
  train_months: 6
  test_months: 2
  roll_months: 1
  initial_capital: 100.0
  symbols: ["CL=F"]
  timeframes: ["15m", "1h"]

# ── Phase 11: Performance Logger ─────────────────────────────────────────
performance:
  csv_export_path: "/tmp/shiva_trades"
  rolling_wr_window: 20
  wr_alert_threshold: 0.55
  daily_summary_hour_utc: 22   # print daily summary at 22:00 UTC
